{% extends "base.html" %}

{% block subtitle %}管理 123 网盘账号与访问凭据{% endblock %}

{% block content %}
<div class="glass-panel animate-fade-in delay-1" style="max-width: 800px;">
    <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between;">
        <span><i class="fa-solid fa-cloud"></i> 123 网盘配置</span>
        <label class="switch">
            <input type="checkbox" id="c123_enabled">
            <span class="slider round"></span>
        </label>
    </h2>
    <form id="tokenForm">
        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label class="form-label">STRM 生成模式</label>
                <select id="c123_strm_type" class="form-control">
                    <option value="fileid">FileID 代理中转 (推荐)</option>
                    <option value="direct">Direct 官方直链 (限流风险)</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Access Token</label>
            <textarea id="tokenInput" class="form-control" rows="5" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
        </div>
        <button type="button" class="btn btn-primary" onclick="saveToken()">
            <i class="fa-solid fa-save"></i> 保存配置
        </button>
        <button type="button" class="btn btn-secondary" onclick="checkUser()">
            <i class="fa-solid fa-user-check"></i> 检查状态
        </button>
    </form>
    
    <div id="userStatus" style="margin-top: 1.5rem; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 0.75rem; display: none;">
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
/* iOS Style Toggle Switch */
.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 24px;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background-color: rgba(255,255,255,0.1); transition: .4s;
}
.slider:before {
  position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
  background-color: var(--text-primary); transition: .4s;
}
input:checked + .slider { background-color: var(--success); }
input:focus + .slider { box-shadow: 0 0 1px var(--success); }
input:checked + .slider:before { transform: translateX(26px); }
.slider.round { border-radius: 24px; }
.slider.round:before { border-radius: 50%; }
</style>
<script>
// 页面加载时自动获取配置
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch('/api/v1/system/config');
        if (res.ok) {
            const config = await res.json();
            document.getElementById('c123_enabled').checked = config.cloud123.enabled;
            document.getElementById('c123_strm_type').value = config.cloud123.strm_type;
            document.getElementById('tokenInput').value = config.cloud123.access_token;
        }
    } catch (e) {
        console.error('Failed to load config', e);
    }
});

async function saveToken() {
    const btn = event.currentTarget;
    const originalText = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 保存中...';
    
    const payload = {
        cloud123: {
            enabled: document.getElementById('c123_enabled').checked,
            strm_type: document.getElementById('c123_strm_type').value,
            access_token: document.getElementById('tokenInput').value
        }
    };

    try {
        const res = await fetch('/api/v1/system/config', {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        
        // 尝试向原有 auth 接口同步（如果需要的话，也可以不用，直接依赖系统配置更新）
        await fetch('/api/v1/123/auth', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({token: payload.cloud123.access_token})
        }).catch(() => {});
        
        if (res.ok) {
            btn.innerHTML = '<i class="fa-solid fa-check"></i> 保存成功！已热加载';
            btn.style.background = 'var(--success)';
            setTimeout(() => {
                btn.disabled = false;
                btn.innerHTML = originalText;
                btn.style.background = '';
            }, 2000);
        } else {
            const data = await res.json();
            alert('失败: ' + data.detail);
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    } catch(e) {
        alert('网络错误');
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

async function checkUser() {
    try {
        const res = await fetch('/api/v1/123/user');
        const statusDiv = document.getElementById('userStatus');
        if(res.ok) {
            const data = await res.json();
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = `
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <div style="font-size: 2rem; color: var(--success);"><i class="fa-solid fa-circle-check"></i></div>
                    <div>
                        <div style="font-weight: bold; font-size: 1.1rem;">${data.name || '已认证用户'}</div>
                        <div style="color: var(--text-secondary); font-size: 0.9rem;">VIP: ${data.vip ? '是' : '否'}</div>
                    </div>
                </div>
            `;
        } else {
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = `<div style="color: var(--error);"><i class="fa-solid fa-circle-xmark"></i> Token 无效或已过期</div>`;
        }
    } catch(e) {
        alert('网络错误');
    }
}
</script>
{% endblock %}
