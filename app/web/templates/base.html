<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Python-STRM</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-play"></i>
            Python-STRM
        </div>
        <ul class="nav-links">
            <li>
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                    <i class="fa-solid fa-chart-pie"></i> 仪表盘
                </a>
            </li>
            <li>
                <a href="/115" class="nav-link {% if request.url.path.startswith('/115') %}active{% endif %}">
                    <i class="fa-solid fa-cloud"></i> 115网盘
                </a>
            </li>
            <li>
                <a href="/123" class="nav-link {% if request.url.path.startswith('/123') %}active{% endif %}">
                    <i class="fa-solid fa-cloud-arrow-down"></i> 123网盘
                </a>
            </li>
            <li>
                <a href="/strm" class="nav-link {% if request.url.path.startswith('/strm') %}active{% endif %}">
                    <i class="fa-solid fa-file-video"></i> STRM 管理
                </a>
            </li>
            <li>
                <a href="/search" class="nav-link {% if request.url.path.startswith('/search') %}active{% endif %}">
                    <i class="fa-solid fa-search"></i> 资源盘搜
                </a>
            </li>
            <li>
                <a href="/emby" class="nav-link {% if request.url.path.startswith('/emby') %}active{% endif %}">
                    <i class="fa-solid fa-tv"></i> Emby 媒体库
                </a>
            </li>
            <li style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                <span style="padding: 0 1.5rem; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em;">核心设置</span>
            </li>
            <li>
                <a href="/notify" class="nav-link {% if request.url.path == '/notify' %}active{% endif %}">
                    <i class="fa-solid fa-bell"></i> 消息推送
                </a>
            </li>
            <li>
                <a href="/organize" class="nav-link {% if request.url.path.startswith('/organize') %}active{% endif %}">
                    <i class="fa-solid fa-film"></i> 刮削与整理
                </a>
            </li>
            <li>
                <a href="/advanced" class="nav-link {% if request.url.path.startswith('/advanced') %}active{% endif %}" style="color: var(--error);">
                    <i class="fa-solid fa-fire-flame-curved"></i> 高级配置
                </a>
            </li>
        </ul>
        
        <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);">
            <button id="themeToggleBtn" class="btn btn-secondary" style="width: 100%; justify-content: flex-start; background: transparent; border: none; padding: 0.875rem 1rem; color: var(--text-secondary);">
                <i class="fa-solid fa-moon" id="themeIcon"></i> <span id="themeText">切换主题</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <header class="page-header animate-fade-in">
            <h1 class="page-title">{{ title }}</h1>
            <p class="page-subtitle">{% block subtitle %}{% endblock %}</p>
        </header>

        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% block scripts %}{% endblock %}

    <!-- Custom Native Toast Container -->
    <div class="custom-toast-container" id="customToastContainer"></div>

    <!-- Global Directory Picker Modal -->
    <div id="globalFolderPickerModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 10000; align-items: center; justify-content: center;">
        <div class="glass-panel animate-fade-in" style="width: 90%; max-width: 500px; padding: 1.5rem; display: flex; flex-direction: column; max-height: 80vh;">
            <h3 style="margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                <span><i class="fa-solid fa-folder-tree"></i> 选择目录</span>
                <i class="fa-solid fa-xmark" style="cursor: pointer; color: var(--text-secondary);" onclick="window.closeDirectoryPicker()"></i>
            </h3>
            
            <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 0.5rem;">
                <button class="btn btn-secondary" id="gfpBackBtn" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;" onclick="window._gfpLoadFolder(window._gfpCurrentParentId)">
                    <i class="fa-solid fa-arrow-up"></i> 返回上级
                </button>
                <span id="gfpCurrentPath" style="font-size: 0.875rem; font-weight: 500; color: var(--accent-primary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">加载中...</span>
            </div>
            
            <div id="gfpList" style="flex: 1; overflow-y: auto; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 0.5rem; min-height: 250px; padding: 0.5rem;">
                <!-- 文件夹列表渲染区域 -->
            </div>
            
            <div style="margin-top: 1rem; display: flex; justify-content: flex-end; gap: 0.5rem;">
                <button class="btn btn-secondary" onclick="window.closeDirectoryPicker()">取消</button>
                <button class="btn btn-primary" onclick="window._gfpConfirmSelection()">确认选择</button>
            </div>
        </div>
    </div>
    
    <style>
    .global-folder-item {
        padding: 0.75rem 1rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        cursor: pointer;
        border-radius: 0.5rem;
        transition: background 0.2s;
        user-select: none;
    }
    .global-folder-item:hover {
        background: rgba(255,255,255,0.08);
    }
    .global-folder-item.selected {
        background: var(--accent-glow);
        border: 1px solid var(--accent-primary);
    }
    .global-folder-item i {
        color: var(--warning);
        font-size: 1.25rem;
    }
    </style>

    <script>
        // --- Theme Switcher Logic ---
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('strm_theme', theme);
            if(themeIcon && themeText) {
                if (theme === 'light') {
                    themeIcon.className = 'fa-solid fa-sun';
                    themeText.textContent = '浅色模式';
                } else {
                    themeIcon.className = 'fa-solid fa-moon';
                    themeText.textContent = '暗黑模式';
                }
            }
        }
        
        // Initialize theme
        const savedTheme = localStorage.getItem('strm_theme') || 'dark';
        applyTheme(savedTheme);
        
        if (themeToggleBtn) {
            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
                applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
            });
        }

        // --- Custom Vanilla Toast Logic ---
        window.showToast = function(message, type = 'primary') {
            const container = document.getElementById('customToastContainer');
            if (!container) return;
            
            const toast = document.createElement('div');
            toast.className = `custom-toast toast-${type}`;
            
            let iconClass = 'fa-info-circle';
            if (type === 'success') iconClass = 'fa-check-circle';
            else if (type === 'error' || type === 'danger') iconClass = 'fa-times-circle';
            else if (type === 'warning') iconClass = 'fa-exclamation-triangle';
            
            toast.innerHTML = `
                <div class="custom-toast-icon"><i class="fa-solid ${iconClass}"></i></div>
                <div class="custom-toast-message">${message}</div>
                <button type="button" style="background:none; border:none; color:inherit; cursor:pointer; opacity:0.7;" onclick="this.parentElement.remove()">
                    <i class="fa-solid fa-times"></i>
                </button>
            `;
            
            container.appendChild(toast);
            
            // Trigger animation
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });
            });
            
            // Auto remove
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300); // Wait for transition
            }, 3000);
        };

        // 劫持原生 alert
        window.alert = function(msg) {
            showToast(msg, 'warning');
        };

        // --- Global Directory Picker Logic ---
        window._gfpCallback = null;
        window._gfpCurrentFolderId = '0';
        window._gfpCurrentParentId = '0';
        window._gfpSelectedFolderId = null;
        window._gfpSelectedFolderName = '';
        window._gfpCloudType = '115';
        
        window.openDirectoryPicker = async function(callback, cloudType = '115') {
            window._gfpCallback = callback;
            window._gfpCloudType = cloudType;
            if (cloudType !== '115') {
                showToast('目录选择器目前仅支持 115网盘', 'warning');
                return;
            }
            
            document.getElementById('globalFolderPickerModal').style.display = 'flex';
            window._gfpSelectedFolderId = null;
            window._gfpSelectedFolderName = '';
            
            await window._gfpLoadFolder('0');
        };
        
        window.closeDirectoryPicker = function() {
            document.getElementById('globalFolderPickerModal').style.display = 'none';
            window._gfpCallback = null;
        };
        
        window._gfpLoadFolder = async function(dirId) {
            const listDiv = document.getElementById('gfpList');
            const pathSpan = document.getElementById('gfpCurrentPath');
            const backBtn = document.getElementById('gfpBackBtn');
            
            listDiv.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-secondary);"><i class="fa-solid fa-spinner fa-spin"></i> 加载中...</div>';
            
            try {
                const res = await fetch(`/api/v1/115/dirs?dir_id=${dirId}`);
                if (!res.ok) {
                    if (dirId !== '0') return window._gfpLoadFolder('0');
                    const err = await res.json();
                    listDiv.innerHTML = `<div style="text-align: center; padding: 2rem; color: var(--error);"><i class="fa-solid fa-triangle-exclamation"></i> ${err.detail || '加载失败'}</div>`;
                    return;
                }
                
                const data = await res.json();
                window._gfpCurrentFolderId = dirId;
                window._gfpCurrentParentId = data.parent_id;
                
                pathSpan.textContent = data.current_dir;
                backBtn.style.display = dirId === '0' ? 'none' : 'inline-flex';
                
                listDiv.innerHTML = '';
                if (data.dirs.length === 0) {
                    listDiv.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-secondary);">该目录下没有子文件夹</div>';
                } else {
                    data.dirs.forEach(d => {
                        const item = document.createElement('div');
                        item.className = 'global-folder-item';
                        if (window._gfpSelectedFolderId === d.cid) item.classList.add('selected');
                        
                        item.innerHTML = `<i class="fa-solid fa-folder"></i> <span style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${d.n}</span>`;
                        
                        let clickTimer = null;
                        item.onclick = (e) => {
                            if (clickTimer) {
                                clearTimeout(clickTimer);
                                clickTimer = null;
                                window._gfpLoadFolder(d.cid);
                            } else {
                                clickTimer = setTimeout(() => {
                                    clickTimer = null;
                                    document.querySelectorAll('.global-folder-item').forEach(el => el.classList.remove('selected'));
                                    item.classList.add('selected');
                                    window._gfpSelectedFolderId = d.cid;
                                    window._gfpSelectedFolderName = d.n;
                                }, 250);
                            }
                        };
                        listDiv.appendChild(item);
                    });
                }
            } catch (e) {
                listDiv.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--error);"><i class="fa-solid fa-triangle-exclamation"></i> 网络错误</div>';
            }
        };
        
        window._gfpConfirmSelection = function() {
            const finalId = window._gfpSelectedFolderId || window._gfpCurrentFolderId;
            const finalName = window._gfpSelectedFolderName || (finalId === '0' ? '根目录' : '未命名目录');
            
            if (window._gfpCallback) {
                window._gfpCallback(finalId, finalName);
            }
            window.closeDirectoryPicker();
        };

        // Custom Async Confirm Modal
        window.customConfirm = function(msg) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'custom-modal-overlay show';
                // 显式强制内联样式，彻底避免因 CSS 缓存导致的 static 布局（即页面重排问题）
                overlay.style.position = 'fixed';
                overlay.style.top = '0';
                overlay.style.left = '0';
                overlay.style.width = '100vw';
                overlay.style.height = '100vh';
                overlay.style.backgroundColor = 'rgba(0, 0, 0, 0.6)';
                overlay.style.backdropFilter = 'blur(4px)';
                overlay.style.display = 'flex';
                overlay.style.alignItems = 'center';
                overlay.style.justifyContent = 'center';
                overlay.style.zIndex = '10000';
                
                const dialog = document.createElement('div');
                dialog.className = 'custom-modal-dialog glass-panel';
                dialog.style.padding = '1.5rem';
                dialog.style.display = 'flex';
                dialog.style.flexDirection = 'column';
                dialog.style.gap = '1.5rem';
                
                const text = document.createElement('div');
                text.style.color = 'var(--text-primary)';
                text.style.fontSize = '1.1rem';
                text.style.whiteSpace = 'pre-wrap';
                text.textContent = msg;
                
                const buttons = document.createElement('div');
                buttons.style.display = 'flex';
                buttons.style.justifyContent = 'flex-end';
                buttons.style.gap = '1rem';
                
                const btnNo = document.createElement('button');
                btnNo.className = 'btn btn-secondary';
                btnNo.textContent = '取消';
                btnNo.onclick = () => {
                    overlay.classList.remove('show');
                    setTimeout(() => overlay.remove(), 300);
                    resolve(false);
                };
                
                const btnYes = document.createElement('button');
                btnYes.className = 'btn btn-primary';
                btnYes.textContent = '确定';
                btnYes.onclick = () => {
                    overlay.classList.remove('show');
                    setTimeout(() => overlay.remove(), 300);
                    resolve(true);
                };
                
                buttons.appendChild(btnNo);
                buttons.appendChild(btnYes);
                dialog.appendChild(text);
                dialog.appendChild(buttons);
                overlay.appendChild(dialog);
                document.body.appendChild(overlay);
            });
        };

        // 劫持原生 alert
        window.alert = function(msg) {
            showToast(msg, 'warning');
        };
    </script>
</body>
</html>
