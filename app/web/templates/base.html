<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Python-STRM</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-play"></i>
            Python-STRM
        </div>
        <ul class="nav-links">
            <li>
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                    <i class="fa-solid fa-chart-pie"></i> 仪表盘
                </a>
            </li>
            <li>
                <a href="/115" class="nav-link {% if request.url.path.startswith('/115') %}active{% endif %}">
                    <i class="fa-solid fa-cloud"></i> 115网盘
                </a>
            </li>
            <li>
                <a href="/123" class="nav-link {% if request.url.path.startswith('/123') %}active{% endif %}">
                    <i class="fa-solid fa-cloud-arrow-down"></i> 123网盘
                </a>
            </li>
            <li>
                <a href="/strm" class="nav-link {% if request.url.path.startswith('/strm') %}active{% endif %}">
                    <i class="fa-solid fa-file-video"></i> STRM 管理
                </a>
            </li>
            <li>
                <a href="/search" class="nav-link {% if request.url.path.startswith('/search') %}active{% endif %}">
                    <i class="fa-solid fa-search"></i> 资源盘搜
                </a>
            </li>
            <li>
                <a href="/emby" class="nav-link {% if request.url.path.startswith('/emby') %}active{% endif %}">
                    <i class="fa-solid fa-tv"></i> Emby 媒体库
                </a>
            </li>
            <li style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border);">
                <span style="padding: 0 1.5rem; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em;">核心设置</span>
            </li>
            <li>
                <a href="/notify" class="nav-link {% if request.url.path == '/notify' %}active{% endif %}">
                    <i class="fa-solid fa-bell"></i> 消息推送
                </a>
            </li>
            <li>
                <a href="/organize" class="nav-link {% if request.url.path.startswith('/organize') %}active{% endif %}">
                    <i class="fa-solid fa-film"></i> 刮削与整理
                </a>
            </li>
            <li>
                <a href="/advanced" class="nav-link {% if request.url.path.startswith('/advanced') %}active{% endif %}" style="color: var(--error);">
                    <i class="fa-solid fa-fire-flame-curved"></i> 高级配置
                </a>
            </li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="page-header animate-fade-in">
            <h1 class="page-title">{{ title }}</h1>
            <p class="page-subtitle">{% block subtitle %}{% endblock %}</p>
        </header>

        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% block scripts %}{% endblock %}

    <!-- Custom Native Toast Container -->
    <div class="custom-toast-container" id="customToastContainer"></div>

    <script>
        // --- Theme Switcher Logic ---
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('strm_theme', theme);
            if (theme === 'light') {
                themeIcon.className = 'fa-solid fa-sun';
                themeText.textContent = '浅色模式';
            } else {
                themeIcon.className = 'fa-solid fa-moon';
                themeText.textContent = '暗黑模式';
            }
        }
        
        // Initialize theme
        const savedTheme = localStorage.getItem('strm_theme') || 'dark';
        applyTheme(savedTheme);
        
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // --- Custom Vanilla Toast Logic ---
        window.showToast = function(message, type = 'primary') {
            const container = document.getElementById('customToastContainer');
            if (!container) return;
            
            const toast = document.createElement('div');
            toast.className = `custom-toast toast-${type}`;
            
            let iconClass = 'fa-info-circle';
            if (type === 'success') iconClass = 'fa-check-circle';
            else if (type === 'error' || type === 'danger') iconClass = 'fa-times-circle';
            else if (type === 'warning') iconClass = 'fa-exclamation-triangle';
            
            toast.innerHTML = `
                <div class="custom-toast-icon"><i class="fa-solid ${iconClass}"></i></div>
                <div class="custom-toast-message">${message}</div>
                <button type="button" style="background:none; border:none; color:inherit; cursor:pointer; opacity:0.7;" onclick="this.parentElement.remove()">
                    <i class="fa-solid fa-times"></i>
                </button>
            `;
            
            container.appendChild(toast);
            
            // Trigger animation
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    toast.classList.add('show');
                });
            });
            
            // Auto remove
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300); // Wait for transition
            }, 3000);
        };

        // Custom Async Confirm Modal
        window.customConfirm = function(msg) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.className = 'custom-modal-overlay show';
                overlay.style.zIndex = '10000';
                
                const dialog = document.createElement('div');
                dialog.className = 'custom-modal-dialog glass-panel';
                dialog.style.padding = '1.5rem';
                dialog.style.display = 'flex';
                dialog.style.flexDirection = 'column';
                dialog.style.gap = '1.5rem';
                
                const text = document.createElement('div');
                text.style.color = 'var(--text-primary)';
                text.style.fontSize = '1.1rem';
                text.style.whiteSpace = 'pre-wrap';
                text.textContent = msg;
                
                const buttons = document.createElement('div');
                buttons.style.display = 'flex';
                buttons.style.justifyContent = 'flex-end';
                buttons.style.gap = '1rem';
                
                const btnNo = document.createElement('button');
                btnNo.className = 'btn btn-secondary';
                btnNo.textContent = '取消';
                btnNo.onclick = () => {
                    overlay.classList.remove('show');
                    setTimeout(() => overlay.remove(), 300);
                    resolve(false);
                };
                
                const btnYes = document.createElement('button');
                btnYes.className = 'btn btn-primary';
                btnYes.textContent = '确定';
                btnYes.onclick = () => {
                    overlay.classList.remove('show');
                    setTimeout(() => overlay.remove(), 300);
                    resolve(true);
                };
                
                buttons.appendChild(btnNo);
                buttons.appendChild(btnYes);
                dialog.appendChild(text);
                dialog.appendChild(buttons);
                overlay.appendChild(dialog);
                document.body.appendChild(overlay);
            });
        };

        // 劫持原生 alert
        window.alert = function(msg) {
            showToast(msg, 'warning');
        };
    </script>
</body>
</html>
