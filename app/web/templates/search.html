{% extends "base.html" %}

{% block content %}
<div class="glass-panel animate-fade-in delay-1" style="margin-bottom: 2rem;">
    <h2 style="margin-bottom: 1.5rem; display: flex; align-items: center;">
        <i class="fa-solid fa-search" style="color: var(--accent-primary); margin-right: 0.75rem;"></i> 全网盘搜引擎
    </h2>
    
    <form id="searchForm" style="display: flex; gap: 1rem; align-items: stretch; flex-wrap: wrap;">
        <div style="flex: 3; min-width: 300px;">
            <input type="text" class="form-control" id="keyword" placeholder="输入你想找的电影或剧集..." required style="height: 100%;">
        </div>
        <div style="flex: 1; min-width: 150px;">
            <select class="form-control" id="sourceType" style="height: 100%;">
                <option value="all" selected>全网搜索</option>
                <option value="plugin">公共 BT & 盘搜</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary" id="searchBtn" style="white-space: nowrap; padding: 0 2rem;">
            <i class="fa-solid fa-search"></i> 搜索
        </button>
    </form>
    <div style="display: flex; gap: 15px; align-items: center; margin-top: 1rem; flex-wrap: wrap;">
        <span style="color: var(--text-secondary); font-size: 0.9rem;">资源过滤:</span>
        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-primary);">
            <input type="checkbox" class="link-type-filter" value="115" checked onchange="renderResults()"> 115网盘
        </label>
        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-primary);">
            <input type="checkbox" class="link-type-filter" value="magnet" checked onchange="renderResults()"> 磁力链接
        </label>
        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-primary);">
            <input type="checkbox" class="link-type-filter" value="torrent" checked onchange="renderResults()"> BT种子
        </label>
        <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-primary);">
            <input type="checkbox" class="link-type-filter" value="other" checked onchange="renderResults()"> 其他
        </label>
    </div>
    
    <!-- Plugins Selection -->
    <div style="margin-top: 1rem;">
        <div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 0.5rem; background: rgba(0,0,0,0.1); border-radius: 4px;" onclick="togglePluginContainer()">
            <span style="color: var(--text-secondary); font-size: 0.9rem;"><i class="fa-solid fa-puzzle-piece" style="margin-right: 5px;"></i> 高级：选择特定插件 (修改后可保存热重载)</span>
            <i class="fa-solid fa-chevron-down" id="pluginToggleIcon" style="color: var(--text-secondary);"></i>
        </div>
        <div id="pluginListContainer" style="display: none; flex-wrap: wrap; gap: 10px; margin-top: 10px; max-height: 200px; overflow-y: auto; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; background: rgba(0,0,0,0.05);">
            <!-- Plugins will be loaded here dynamically -->
        </div>
        <div id="pluginActionContainer" style="display: none; justify-content: flex-end; margin-top: 10px; gap: 10px;">
            <button type="button" class="btn btn-secondary" onclick="selectAllPlugins(false)" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;">全部取消</button>
            <button type="button" class="btn btn-secondary" onclick="selectAllPlugins(true)" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;">全选</button>
            <button type="button" class="btn btn-primary" onclick="savePluginConfig()" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;"><i class="fa-solid fa-save"></i> 永久保存为默认插件</button>
        </div>
    </div>
</div>

<div id="loadingIndicator" style="text-align: center; margin: 4rem 0; display: none;">
    <i class="fa-solid fa-spinner fa-spin fa-3x" style="color: var(--accent-primary); margin-bottom: 1.5rem;"></i>
    <h4 style="color: var(--text-secondary); font-weight: 400;">引擎正在全力拉取数据，这可能需要十秒钟左右...</h4>
</div>

<div id="resultsContainer" class="grid-2 animate-fade-in delay-2">
    <!-- Results will be populated here -->
</div>

<!-- Transfer Modal -->
<div class="custom-modal-overlay" id="transferModal">
  <div class="custom-modal-dialog">
    <div class="glass-panel" style="padding: 0; width: 100%; border: 1px solid var(--border); overflow: hidden;">
      <div style="padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2);">
        <h3 id="transferModalTitle" style="margin: 0; font-size: 1.25rem;"><i class="fa-solid fa-cloud-arrow-down" style="margin-right: 0.5rem; color: var(--accent-primary);"></i> 一键转存</h3>
        <button type="button" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.2rem;" onclick="closeTransferModal()"><i class="fa-solid fa-times"></i></button>
      </div>
      <div style="padding: 1.5rem;">
        <p style="margin-bottom: 1rem; color: var(--text-secondary);">选择目标目录：</p>
        <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
            <input type="text" id="targetDirSelect" class="form-control" placeholder="点击右侧按钮选择..." readonly>
            <button type="button" class="btn btn-secondary" onclick="window.openDirectoryPicker(id => document.getElementById('targetDirSelect').value = id, currentTransferCloudType)" style="white-space: nowrap; padding: 0.5rem 1rem;">
                <i class="fa-solid fa-folder-open"></i> 选择目录
            </button>
        </div>
        
        <div id="receiveCodeContainer" style="display: none; margin-bottom: 1.5rem;">
            <label class="form-label">提取码（如有）</label>
            <input type="text" class="form-control" id="receiveCodeInput" placeholder="输入4位提取码">
        </div>
        
        <input type="hidden" id="transferUrlInput">
      </div>
      <div style="padding: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 1rem; background: rgba(0,0,0,0.2);">
        <button type="button" class="btn btn-secondary" onclick="closeTransferModal()">取消</button>
        <button type="button" class="btn btn-primary" id="confirmTransferBtn" onclick="submitTransfer()">开始转存并洗版</button>
      </div>
    </div>
  </div>
</div>

<script>
    let currentSearchResults = [];

    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const res = await fetch('/api/v1/search/plugins');
            const data = await res.json();
            const container = document.getElementById('pluginListContainer');
            if (data.plugins && data.plugins.length > 0) {
                container.innerHTML = '';
                data.plugins.forEach(p => {
                    const label = document.createElement('label');
                    label.style.display = 'flex';
                    label.style.alignItems = 'center';
                    label.style.gap = '5px';
                    label.style.cursor = 'pointer';
                    label.style.fontSize = '0.85rem';
                    label.style.padding = '2px 6px';
                    label.style.background = 'rgba(255,255,255,0.05)';
                    label.style.borderRadius = '4px';
                    
                    label.innerHTML = `<input type="checkbox" class="plugin-checkbox" value="${p.id}" checked> ${p.name}`;
                    container.appendChild(label);
                });
            }
        } catch (e) {
            console.error("Failed to load plugins:", e);
        }
    });

    function togglePluginContainer() {
        const container = document.getElementById('pluginListContainer');
        const actionContainer = document.getElementById('pluginActionContainer');
        const icon = document.getElementById('pluginToggleIcon');
        if (container.style.display === 'none') {
            container.style.display = 'flex';
            actionContainer.style.display = 'flex';
            icon.classList.remove('fa-chevron-down');
            icon.classList.add('fa-chevron-up');
        } else {
            container.style.display = 'none';
            actionContainer.style.display = 'none';
            icon.classList.remove('fa-chevron-up');
            icon.classList.add('fa-chevron-down');
        }
    }

    function selectAllPlugins(select) {
        document.querySelectorAll('.plugin-checkbox').forEach(cb => {
            cb.checked = select;
        });
    }

    async function savePluginConfig() {
        const selectedPlugins = Array.from(document.querySelectorAll('.plugin-checkbox:checked')).map(cb => cb.value);
        if (selectedPlugins.length === 0) {
            showNotification('请至少选择一个插件！', 'error');
            return;
        }
        try {
            const res = await fetch('/api/v1/search/plugins/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ enabled_plugins: selectedPlugins })
            });
            const data = await res.json();
            if (data.code === 0) {
                showNotification('插件配置已永久保存并完成热加载！', 'success');
            } else {
                showNotification(data.detail || data.message || '更新失败', 'error');
            }
        } catch (e) {
            console.error(e);
            showNotification('网络错误', 'error');
        }
    }

    function showNotification(message, type = 'success') {
        if (window.showToast) {
            window.showToast(message, type);
        } else {
            alert(message);
        }
    }

    document.getElementById('searchForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const keyword = document.getElementById('keyword').value;
        const sourceType = document.getElementById('sourceType').value;
        const btn = document.getElementById('searchBtn');
        const loading = document.getElementById('loadingIndicator');
        const container = document.getElementById('resultsContainer');
        
        btn.disabled = true;
        const oldBtnText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 搜索中';
        loading.style.display = 'block';
        container.innerHTML = '';
        
        try {
            // Collect selected plugins
            const allCheckboxes = document.querySelectorAll('.plugin-checkbox');
            let pluginsQuery = '';
            if (allCheckboxes.length > 0) {
                const selectedPlugins = Array.from(document.querySelectorAll('.plugin-checkbox:checked')).map(cb => cb.value);
                // If not all are selected, we pass the specific plugins list
                if (selectedPlugins.length < allCheckboxes.length) {
                    pluginsQuery = `&plugins=${encodeURIComponent(selectedPlugins.join(','))}`;
                }
            }

            const res = await fetch(`/api/v1/search/?keyword=${encodeURIComponent(keyword)}&source_type=${sourceType}${pluginsQuery}`);
            const data = await res.json();
            
            loading.style.display = 'none';
            currentSearchResults = data.results || [];
            renderResults();
        } catch (err) {
            loading.style.display = 'none';
            container.innerHTML = `<div style="grid-column: 1 / -1; text-align: center; color: var(--error); padding: 4rem;"><i class="fa-solid fa-circle-exclamation fa-4x" style="margin-bottom: 1.5rem;"></i><h3>搜索请求失败: ${err.message}</h3></div>`;
        } finally {
            btn.disabled = false;
            btn.innerHTML = oldBtnText;
        }
    });

    function renderResults() {
        const container = document.getElementById('resultsContainer');
        container.innerHTML = '';
        const allowedTypes = Array.from(document.querySelectorAll('.link-type-filter:checked')).map(cb => cb.value);

        if (currentSearchResults.length > 0) {
            let displayedCount = 0;
            currentSearchResults.forEach(item => {
                let linksHtml = '';
                let hasMatchingLink = false;
                if (item.links && item.links.length > 0) {
                    item.links.forEach(link => {
                        let type = (link.type || '').toLowerCase();
                        let filterType = "other";
                        if (type === '115') filterType = "115";
                        else if (type.includes('magnet')) filterType = "magnet";
                        else if (type === 'torrent' || type === 'bt') filterType = "torrent";
                        
                        if (allowedTypes.includes(filterType)) {
                            hasMatchingLink = true;
                            let linkTypeStr = link.type.toUpperCase() || "链接";
                            let passHtml = link.password ? `<span style="font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; margin-left: 8px;">提取码: ${link.password}</span>` : "";
                            let targetCloud = type;
                            if (type === 'magnet' || type === 'torrent' || type === 'bt') {
                                targetCloud = '115'; // 磁力或BT默认使用 115 离线下载
                            } else if (type === '115') {
                                targetCloud = '115';
                            }
                            
                            linksHtml += `
                                <div style="display: flex; align-items: center; margin-bottom: 0.75rem; padding: 0.75rem; background: rgba(0,0,0,0.2); border-radius: 0.5rem; border: 1px solid var(--border);">
                                    <span style="font-size: 0.75rem; font-weight: 600; background: var(--accent-primary); color: white; padding: 4px 8px; border-radius: 4px; margin-right: 12px; white-space: nowrap;">${linkTypeStr}</span>
                                    <span style="flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-secondary); font-size: 0.85rem;" title="${link.url}">${link.url}</span>
                                    ${passHtml}
                                    <button class="btn btn-secondary" style="padding: 0.4rem 0.75rem; font-size: 0.85rem; margin-left: 12px; white-space: nowrap;" onclick="openTransferModal('${link.url}', '${link.password || ''}', '${targetCloud}')">
                                        一键转存
                                    </button>
                                </div>
                            `;
                        }
                    });
                }
                
                if (hasMatchingLink) {
                    displayedCount++;
                    const card = document.createElement('div');
                    card.className = 'glass-panel';
                    card.style.padding = '1.5rem';
                    card.style.display = 'flex';
                    card.style.flexDirection = 'column';
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <span style="font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.05em;">${item.channel || '磁力'}</span>
                            <small style="color: var(--text-secondary);">${new Date(item.datetime).toLocaleString()}</small>
                        </div>
                        <h3 style="color: var(--text-primary); margin-bottom: 0.75rem; font-size: 1.1rem; line-height: 1.5; font-weight: 600;">${item.title}</h3>
                        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.6; flex-grow: 1;">${item.content || ''}</p>
                        <div style="border-top: 1px solid var(--border); margin: 0 0 1rem 0;"></div>
                        ${linksHtml}
                    `;
                    container.appendChild(card);
                }
            });
            
            if (displayedCount === 0) {
                container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: var(--text-secondary); padding: 4rem;"><i class="fa-solid fa-filter fa-4x" style="margin-bottom: 1.5rem; opacity: 0.5;"></i><h3>当前过滤条件下没有结果</h3></div>';
            }
        } else {
            container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: var(--text-secondary); padding: 4rem;"><i class="fa-solid fa-inbox fa-4x" style="margin-bottom: 1.5rem; opacity: 0.5;"></i><h3>未搜索到任何结果</h3></div>';
        }
    }

    function closeTransferModal() {
        const modal = document.getElementById('transferModal');
        if (modal) {
            modal.classList.remove('show');
        }
    }
    
    let currentTransferCloudType = '115';
    
    function openTransferModal(url, password, cloudType) {
        currentTransferCloudType = cloudType || '115';
        document.getElementById('transferUrlInput').value = url;
        const codeInput = document.getElementById('receiveCodeInput');
        const codeContainer = document.getElementById('receiveCodeContainer');
        
        document.getElementById('transferModalTitle').innerHTML = `<i class="fa-solid fa-cloud-arrow-down" style="margin-right: 0.5rem; color: var(--accent-primary);"></i> 转存至 ${currentTransferCloudType.toUpperCase()}`;
        
        if (url.includes('115.com/s/') || url.includes('share_code=')) {
            codeContainer.style.display = 'block';
            codeInput.value = password || '';
        } else {
            codeContainer.style.display = 'none';
            codeInput.value = '';
        }
        
        const modal = document.getElementById('transferModal');
        if (modal) {
            modal.classList.add('show');
        }
    }
    
    async function submitTransfer() {
        const url = document.getElementById('transferUrlInput').value;
        const dirId = document.getElementById('targetDirSelect').value;
        const receiveCode = document.getElementById('receiveCodeInput').value;
        const btn = document.getElementById('confirmTransferBtn');
        
        if (!dirId) {
            showNotification('请选择目标目录', 'warning');
            return;
        }
        
        btn.disabled = true;
        const oldText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 投递中...';
        
        try {
            const res = await fetch('/api/v1/search/transfer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    url: url,
                    target_dir_id: dirId,
                    receive_code: receiveCode,
                    cloud_type: currentTransferCloudType
                })
            });
            
            const data = await res.json();
            if (res.ok) {
                showNotification(data.msg || '转存成功！', 'success');
                closeTransferModal();
            } else {
                showNotification('失败: ' + (data.detail || '未知错误'), 'error');
            }
        } catch (e) {
            showNotification('网络错误: ' + e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = oldText;
        }
    }
</script>
{% endblock %}
