version: '3.8'

services:
  python-strm:
    build: .
    container_name: python-strm
    restart: always
    network_mode: bridge
    ports:
      - "8095:8095"
    volumes:
      # 持久化数据库与日志
      - ./data:/app/data
      # 持久化 STRM 生成产物 (映射给外层的 Emby/Jellyfin 读取)
      - ./strm_output:/app/strm_output
      # 持久化配置文件 (可选，如果您希望在宿主机直接改 YAML 则取消注释)
      # - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai
